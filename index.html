<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="./css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lun</title>

<body>
    <div class="container indigo topBotomBordersOut">
        <a>HOME</a>
        <a>ABOUT</a>        
        <a>PROJECTS</a>
        <a>CONTACT</a>
    </div>

    <div id="home" class="item">

    </div>

    <div id="about" class="item">
        <h1>ABOUT ME</h1>
        <p>Hi there! I am Chia-Lun Huang</p>        
    </div>

    <div id="projects" class="item">
        <h1>PROJECTS</h1>
    </div>

    <div id="contact" class="item">
        <h1>CONTACT ME</h1>
        <p>Whether you're interested in working with me or just want to say hello, I'd love to hear from you!</p>
        <form action="" id="contact_form">
            <input id="contact_name" class="contact_form" placeholder="NAME" type="text">
            <input id="contact_mail" class="contact_form" placeholder="EMAIL" type="text">
            <textarea name="" id="contact_message" class="contact_form" placeholder="MESSAGE"></textarea>
            <input class="contact_form rainbow" type="submit" value="SEND MESSAGE">
        </form>
    </div>

    

    <footer>

        <a href="https://github.com/Hlunlun" class="fa fa-github"></a>

    </footer>
